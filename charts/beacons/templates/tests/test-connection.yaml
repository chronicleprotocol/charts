apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "beacons.fullname" . }}-test-connection"
  labels:
    {{- include "beacons.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
      command: ['wget']
      args: ['{{ include "beacons.fullname" . }}:{{ .Values.httpPort }}/eth/v1/node/version']
  restartPolicy: Never