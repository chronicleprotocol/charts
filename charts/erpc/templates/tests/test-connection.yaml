apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "erpc.fullname" . }}-test-connection"
  labels:
    {{- include "erpc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook-weight": "5"
    "helm.sh/hook": test
spec:
  containers:
  {{- $serviceName := include "erpc.fullname" . }}
  {{- range $name, $config := .Values.service.ports }}
    - name: nc-{{ $name }}
      image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
      command: ['nc']
      args:
        - '-zv'
        - '-v'
        - '{{ $serviceName }}'
        - '{{ $config.port }}'
  {{- end }}
  restartPolicy: Never
