apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "rpc-router.fullname" . }}-sleep"
  labels:
    {{- include "rpc-router.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook-weight": "1"
    "helm.sh/hook": test
spec:
  containers:
    - name: sleep
      image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
      command: ['sleep']
      args:
        - '30'
  restartPolicy: Never
