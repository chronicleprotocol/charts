{{- $rpcSecrets := .Values.rpcSecrets | default dict -}}
{{- $ethRpcSecret := get $rpcSecrets "ethRpcUrl" | default dict -}}
{{- $flashbotsRpcSecret := get $rpcSecrets "flashbotsRpcUrl" | default dict -}}
{{- $normalEnv := .Values.env.normal | default dict -}}
{{- if and $ethRpcSecret .Values.ethRpcUrl -}}
{{- fail "ethRpcUrl and rpcSecrets.ethRpcUrl cannot both be set" -}}
{{- end -}}
{{- if and $flashbotsRpcSecret .Values.flashbotsRpcUrl -}}
{{- fail "flashbotsRpcUrl and rpcSecrets.flashbotsRpcUrl cannot both be set" -}}
{{- end -}}
{{- if and $ethRpcSecret (hasKey $normalEnv "ETH_RPC_URL") -}}
{{- fail "env.normal.ETH_RPC_URL is reserved when rpcSecrets.ethRpcUrl is set" -}}
{{- end -}}
{{- if and $flashbotsRpcSecret (hasKey $normalEnv "FLASHBOTS_RPC_URL") -}}
{{- fail "env.normal.FLASHBOTS_RPC_URL is reserved when rpcSecrets.flashbotsRpcUrl is set" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "challenger.fullname" . }}
  labels:
    {{- include "challenger.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "challenger.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "challenger.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "challenger.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- /* Replace the original image line with this block */}}
          {{- if eq .Values.implementation "go" }}
          image: "{{ .Values.image.repository }}/{{ .Values.tags.challengerGo }}"
          {{- else if eq .Values.implementation "rs" }}
          image: "{{ .Values.image.repository }}/{{ .Values.tags.challengerRs }}"
          {{- else }}
          {{- /* It's good practice to handle unexpected values for .Values.implementation */}}
          {{- /* This will cause Helm to fail if .Values.implementation is not 'go' or 'rs' */}}
          {{- required (printf "Invalid .Values.implementation: '%s'. Must be 'go' or 'rs'." .Values.implementation) nil }}
          {{- end }}
          args:
          {{- if eq .Values.implementation "go" }}
            - "run"
          {{- end }}
          {{- range $address := .Values.contractAddresses }}
            - "-a"
            - "{{ $address }}"
          {{- end }}
            - "--rpc-url"
          {{- if $ethRpcSecret }}
            - "$(ETH_RPC_URL)"
          {{- else }}
            - "{{ .Values.ethRpcUrl }}"
          {{- end }}
          {{- if or .Values.flashbotsRpcUrl $flashbotsRpcSecret }}
            - "--flashbot-rpc-url"
            {{- if $flashbotsRpcSecret }}
            - "$(FLASHBOTS_RPC_URL)"
            {{- else }}
            - "{{ .Values.flashbotsRpcUrl }}"
            {{- end }}
          {{- end }}
          {{- if  .Values.ethConfig.ethPrivateKey }}
            - "--secret-key"
            - "${ETH_SECRET_KEY}"
          {{- end }}
          {{- if .Values.ethConfig.ethKeys }}
            - "--keystore"
            - "/keystore/keystore.json"
            - "--password-file"
            - "/password/password.txt"
          {{- end }}
            - "--chain-id"
            - "{{ .Values.ethChainId }}"
          {{- if .Values.transactionType }}
            - "--tx-type"
            - "{{ .Values.transactionType | default "legacy" }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}

          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}


          env:
          {{- if $ethRpcSecret }}
          - name: ETH_RPC_URL
            valueFrom:
              secretKeyRef:
                name: {{ required "rpcSecrets.ethRpcUrl.existingSecret is required" $ethRpcSecret.existingSecret | quote }}
                key: {{ required "rpcSecrets.ethRpcUrl.key is required" $ethRpcSecret.key | quote }}
          {{- end }}
          {{- if $flashbotsRpcSecret }}
          - name: FLASHBOTS_RPC_URL
            valueFrom:
              secretKeyRef:
                name: {{ required "rpcSecrets.flashbotsRpcUrl.existingSecret is required" $flashbotsRpcSecret.existingSecret | quote }}
                key: {{ required "rpcSecrets.flashbotsRpcUrl.key is required" $flashbotsRpcSecret.key | quote }}
          {{- end }}
          {{- if .Values.ethConfig.ethPrivateKey }}
          - name: ETH_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Values.ethConfig.ethPrivateKey.existingSecret }}
                key: {{ .Values.ethConfig.ethPrivateKey.key }}
          {{- end }}
          {{- include "helpers.list-env-variables" . | indent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.ethConfig.ethKeys }}
            - name: keystore
              mountPath: /keystore/
            - name: password
              mountPath: /password/
            {{- end }}
      volumes:
      {{- if .Values.ethConfig.ethKeys }}
      - name: keystore
        secret:
          secretName: {{ .Values.ethConfig.ethKeys.existingSecret }}
          items:
          - key: {{ .Values.ethConfig.ethKeys.key }}
            path: keystore.json
      {{- end }}
      {{- if .Values.ethConfig.ethPass }}
      - name: password
        secret:
          secretName: {{ .Values.ethConfig.ethPass.existingSecret }}
          items:
          - key: {{ .Values.ethConfig.ethPass.key }}
            path: password.txt
      {{- end }}


      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
