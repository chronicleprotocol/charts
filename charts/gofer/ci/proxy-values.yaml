goferMode: "proxy"
extraArgs: []

env:
  normal:
    CFG_WATCH_INTERVAL: "10s"

livenessProbe:
  httpGet:
    path: /healthz
    port: healthcheck
  initialDelaySeconds: 60
  periodSeconds: 120

readinessProbe:
  httpGet:
    path: /healthz
    port: healthcheck
  initialDelaySeconds: 60
  periodSeconds: 60
